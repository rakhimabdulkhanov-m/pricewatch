name: Rozetka DC Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install curl_cffi
        run: pip install curl_cffi

      - name: Run Rozetka probe
        run: python scripts/rozetka_probe.py
